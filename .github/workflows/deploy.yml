name: Auto Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: 52.22.227.138
          username: ubuntu
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd ~/lemma-zk-tracer
            git pull origin main
            pkill -9 -f "streamlit run" || true
            sleep 2
            source .venv/bin/activate
            nohup streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501 &
